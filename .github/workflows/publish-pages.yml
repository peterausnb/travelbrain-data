name: Publish GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Build-Metadaten festlegen
        run: |
          echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_SEQUENCE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
      - run: python -m pip install -r requirements-dev.txt
      - run: python scripts/validate.py
      - run: python scripts/build.py
      - name: Manifest signieren, falls konfiguriert
        env:
          TRAVELBRAIN_SIGNING_KEY_PEM: ${{ secrets.TRAVELBRAIN_SIGNING_KEY_PEM }}
          TRAVELBRAIN_SIGNING_KEY_ID: ${{ vars.TRAVELBRAIN_SIGNING_KEY_ID }}
        run: |
          if [[ -n "$TRAVELBRAIN_SIGNING_KEY_PEM" && -n "$TRAVELBRAIN_SIGNING_KEY_ID" ]]; then
            python scripts/sign_manifest.py
          elif [[ -n "$TRAVELBRAIN_SIGNING_KEY_PEM" || -n "$TRAVELBRAIN_SIGNING_KEY_ID" ]]; then
            echo "Signing configuration is incomplete" >&2
            exit 1
          else
            echo "Signing is not activated yet"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
