      sourceRefs: [aa-ungarn]
    toll:
      de: Autobahnen und mehrere weitere Straßen sind für Pkw elektronisch vignettenpflichtig. Die Kontrolle erfolgt über das Kennzeichen; Kaufbeleg und Kennzeicheneingabe sorgfältig prüfen.
      sourceRefs: [aa-ungarn]
    alcohol:
      de: Für Alkohol am Steuer gilt grundsätzlich Nulltoleranz.
      sourceRefs: [aa-ungarn]
