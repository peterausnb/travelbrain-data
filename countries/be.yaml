  iso2: BE
  iso3: BEL
  name:
    de: Belgien
  euMember: true
  schengenMember: true
  coverage: complete
content:
  locale: de-DE
  audience:
    residenceCountry: DE
    nationality: DE
  summary:
    de: Reisebasiswissen für deutsche Staatsangehörige mit Schwerpunkt Straßenreise.
  entry:
    documents:
      de: Für deutsche Staatsangehörige ist die Einreise mit Reisepass oder Personalausweis möglich. Auch Kinder benötigen ein eigenes Reisedokument.
      sourceRefs: [aa-belgien]
    carryDocument:
      de: Ein gültiges Reisedokument sollte während der Reise mitgeführt werden, da Kontrollen möglich sind.
      sourceRefs: [aa-belgien]
  road:
    drivingLicence:
      de: Der deutsche Führerschein wird anerkannt.
      sourceRefs: [aa-belgien]
    toll:
      de: Für Pkw gibt es keine allgemeine Autobahnmaut. Eine wichtige Ausnahme ist der mautpflichtige Liefkenshoektunnel bei Antwerpen.
      paymentMethods:
        de: Am Liefkenshoektunnel kann je nach Spur unter anderem mit Karte, Bargeld oder elektronischem Teletol-System bezahlt werden.
      sourceRefs: [liefkenshoek-rates]
    restrictedTrafficZones:
      de: In Brüssel, Antwerpen und Gent gelten Umweltzonen mit fahrzeugabhängigen Zufahrtsregeln. Für ausländisch zugelassene Fahrzeuge kann eine vorherige Registrierung erforderlich sein; vor der Einfahrt die jeweilige Stadtregel prüfen.
      sourceRefs: [brussels-lez, ghent-lez]
    alcohol:
      de: Für Fahrer allgemein gilt eine Alkoholgrenze von 0,5 Promille; für Berufskraftfahrer gilt 0,2 Promille.
      sourceRefs: [eu-road-rules-belgium]
    equipmentAndLights:
      de: Sicherheitsgurte sind vorgeschrieben. Die jeweils gültigen belgischen Verkehrs- und Ausrüstungsvorschriften sollten vor der Fahrt geprüft werden.
      sourceRefs: [eu-road-rules-belgium]
    winter:
      de: Es gibt keine landesweit generelle Winterreifenpflicht für Pkw. Bei winterlichen Bedingungen sind geeignete Reifen dennoch sinnvoll; lokale Beschilderung beachten.
      sourceRefs: [aa-belgien]
  money:
    currencyCode: EUR
    currencyName:
      de: Euro
    note:
      de: Belgien gehört zum Euroraum; ein Währungsumtausch aus Euro ist nicht erforderlich.
    sourceRefs: [ecb-euro]
  power:
    voltage: 230
    frequencyHz: 50
    plugTypes: [C, E]
    adapterHint:
      de: Eurostecker passen. Moderne deutsche Schutzkontaktstecker mit E/F-Kompatibilität passen in der Regel ebenfalls; bei älteren Sondersteckern kann ein Adapter nötig sein.
    sourceRefs: [iec-60038, worldstandards-power-belgium]
  emergency:
    numbers:
      - service:
          de: Einheitlicher Notruf
        number: "112"
    note:
      de: Die 112 ist in der gesamten EU kostenlos erreichbar und verbindet mit den zuständigen Notfalldiensten.
    sourceRefs: [eu-emergency]
  pets:
    scope:
      de: Private Reise mit Hund, Katze oder Frettchen aus Deutschland.
    requirements:
      - de: Gültiger EU-Heimtierausweis
      - de: Kennzeichnung durch Mikrochip oder zulässige ältere Tätowierung
      - de: Gültige Tollwutimpfung
    youngAnimals:
      de: Für junge, noch nicht wirksam gegen Tollwut geschützte Tiere gelten besondere EU- und nationale Regeln; vor der Reise die aktuelle belgische Regelung prüfen.
    sourceRefs: [eu-pets]
  phrases:
    - category: greeting
      de: Guten Tag
      local: Bonjour / Goedendag
    - category: hotel
      de: Ich habe eine Reservierung.
      local: J'ai une réservation. / Ik heb een reservatie.
    - category: restaurant
      de: Die Rechnung, bitte.
      local: L'addition, s'il vous plaît. / De rekening, alstublieft.
    - category: shopping
      de: Kann ich mit Karte bezahlen?
      local: Puis-je payer par carte ? / Kan ik met kaart betalen?
    - category: transport
      de: Wo ist die nächste Tankstelle?
      local: Où est la station-service la plus proche ? / Waar is het dichtstbijzijnde tankstation?
    - category: doctor
      de: Ich brauche einen Arzt.
      local: J'ai besoin d'un médecin. / Ik heb een dokter nodig.
    - category: pharmacy
      de: Wo ist eine Apotheke?
      local: Où est une pharmacie ? / Waar is een apotheek?
    - category: emergency
      de: Bitte rufen Sie den Notruf.
      local: Appelez les secours, s'il vous plaît. / Bel de hulpdiensten, alstublieft.
