    documents:
      de: Deutsche Staatsangehörige können mit Reisepass oder Personalausweis einreisen. Auch Kinder benötigen ein eigenes gültiges Reisedokument.
      sourceRefs: [aa-slowakei]
  road:
    drivingLicence: {de: Der deutsche Führerschein wird anerkannt., sourceRefs: [aa-slowakei]}
    toll:
      de: Autobahnen und bestimmte Schnellstraßen sind für Pkw elektronisch vignettenpflichtig. Die Vignette über offizielle Verkaufswege beziehungsweise EZNAMKA erwerben.
      sourceRefs: [aa-slowakei]
    equipmentAndLights:
      de: Ganzjährig besteht Lichtpflicht. Zwischen 15. November und 31. März gelten Winterreifenvorgaben; zusätzlich die aktuelle Witterung beachten.
      sourceRefs: [aa-slowakei]
