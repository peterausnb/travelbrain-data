content:
  locale: de-DE
  audience:
    residenceCountry: DE
    nationality: DE
  summary:
    de: Reisebasiswissen für deutsche Staatsangehörige mit Schwerpunkt Straßenreise in den europäischen Niederlanden.
  entry:
    documents:
      de: Für deutsche Staatsangehörige ist die Einreise mit Reisepass oder Personalausweis möglich. Auch Kinder benötigen ein eigenes gültiges Reisedokument.
      sourceRefs: [aa-niederlande]
    carryDocument:
      de: Wegen möglicher Grenz- und Personenkontrollen sollten gültige Reisedokumente während der Reise mitgeführt werden.
      sourceRefs: [aa-niederlande]
  road:
    drivingLicence:
      de: Der deutsche Führerschein wird anerkannt.
      sourceRefs: [aa-niederlande]
    toll:
      de: Es gibt kein flächendeckendes Pkw-Mautsystem. Auf einzelnen Sonderstrecken fällt jedoch Maut an, insbesondere auf der A24/Blankenburgverbindung bei Rotterdam.
      paymentMethods:
        de: Auf der A24 wird die Maut elektronisch über das Kennzeichen erfasst. Sie kann automatisch oder innerhalb der vorgegebenen Frist online bezahlt werden; dies gilt auch für ausländische Kennzeichen.
      sourceRefs: [rijksoverheid-a24]
    restrictedTrafficZones:
      de: Mehrere Städte haben Umweltzonen. Für Diesel-Pkw gelten aktuell insbesondere in Amsterdam, Arnhem, Den Haag und Utrecht Zufahrtsbeschränkungen nach Emissionsklasse; die Regeln gelten auch für ausländische Fahrzeuge.
      sourceRefs: [milieuzones-locations, milieuzones-english]
    alcohol:
      de: Allgemeine Alkoholgrenze 0,5 Promille; für Fahranfänger mit weniger als fünf Jahren Fahrerfahrung gilt 0,2 Promille.
      sourceRefs: [aa-niederlande, eu-road-rules-netherlands]
    equipmentAndLights:
      de: Besondere Aufmerksamkeit gilt Radfahrern und markierten Radwegen. Durchgezogene Radfahrstreifen dürfen von Kraftfahrzeugen nicht befahren werden.
      sourceRefs: [eu-road-rules-netherlands]
    winter:
      de: Es besteht keine allgemeine saisonale Winterreifenpflicht. Bei winterlichen Straßenverhältnissen sollte die Ausrüstung dennoch an Wetter und Strecke angepasst werden.
      sourceRefs: [eu-road-rules-netherlands]
  money:
    currencyCode: EUR
    currencyName:
      de: Euro
    note:
      de: In den europäischen Niederlanden ist der Euro das gesetzliche Zahlungsmittel. Kartenzahlung ist weit verbreitet und wird vielerorts bevorzugt.
    sourceRefs: [aa-niederlande, ecb-euro]
  power:
    voltage: 230
    frequencyHz: 50
    plugTypes: [C, F]
    adapterHint:
      de: Deutsche Euro- und Schuko-Stecker passen in der Regel ohne Adapter.
    sourceRefs: [iec-60038, worldstandards-power-netherlands]
  emergency:
    numbers:
      - service:
          de: Einheitlicher Notruf
        number: "112"
    note:
      de: Die 112 ist in der gesamten EU kostenlos erreichbar und verbindet mit den zuständigen Notfalldiensten.
    sourceRefs: [eu-emergency]
  pets:
    scope:
      de: Private Reise mit Hund, Katze oder Frettchen aus Deutschland.
    requirements:
      - de: Gültiger EU-Heimtierausweis
      - de: Kennzeichnung durch Mikrochip oder zulässige ältere Tätowierung
      - de: Gültige Tollwutimpfung
    youngAnimals:
      de: Für junge Tiere ohne wirksamen Tollwutschutz gelten besondere EU-Regeln; vor der Reise die aktuellen Voraussetzungen prüfen.
    sourceRefs: [aa-niederlande, eu-pets]
  phrases:
    - category: greeting
      de: Guten Tag
      local: Goedendag
    - category: hotel
      de: Ich habe eine Reservierung.
      local: Ik heb een reservering.
    - category: restaurant
      de: Die Rechnung, bitte.
      local: De rekening, alstublieft.
    - category: shopping
      de: Kann ich mit Karte bezahlen?
      local: Kan ik met pin betalen?
    - category: transport
      de: Wo ist die nächste Tankstelle?
      local: Waar is het dichtstbijzijnde tankstation?
    - category: doctor
      de: Ich brauche einen Arzt.
      local: Ik heb een dokter nodig.
    - category: pharmacy
      de: Wo ist eine Apotheke?
      local: Waar is een apotheek?
    - category: emergency
      de: Bitte rufen Sie den Notruf.
      local: Bel alstublieft de hulpdiensten.
