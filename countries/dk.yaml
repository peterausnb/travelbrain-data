  name:
    de: Dänemark
  euMember: true
  schengenMember: true
  coverage: complete
content:
  locale: de-DE
  audience:
    residenceCountry: DE
    nationality: DE
  summary:
    de: Reisebasiswissen für deutsche Staatsangehörige mit Schwerpunkt Straßenreise nach Dänemark.
  entry:
    documents:
      de: Deutsche Staatsangehörige können mit Reisepass oder Personalausweis einreisen. Auch Kinder benötigen ein eigenes gültiges Reisedokument.
      sourceRefs: [aa-daenemark]
    carryDocument:
      de: Ein gültiges Reisedokument sollte während der Reise mitgeführt werden, da Kontrollen möglich sind.
      sourceRefs: [aa-daenemark]
  road:
    drivingLicence:
      de: Der deutsche Führerschein wird anerkannt.
      sourceRefs: [aa-daenemark]
    toll:
      de: Für Pkw gibt es keine allgemeine Autobahnvignette. Für einzelne große Brückenverbindungen wie Storebælt und Øresund fallen Nutzungsentgelte an.
      sourceRefs: [aa-daenemark]
    alcohol:
      de: Die allgemeine Alkoholgrenze beträgt 0,5 Promille.
      sourceRefs: [aa-daenemark]
    equipmentAndLights:
      de: Lokale Verkehrs- und Sicherheitsvorschriften sowie die Beschilderung beachten; vor Fahrtantritt die aktuellen Reisehinweise prüfen.
      sourceRefs: [aa-daenemark]
  money:
    currencyCode: DKK
    currencyName:
      de: Dänische Krone
    note:
      de: Dänemark gehört nicht zum Euroraum. Kartenzahlung ist sehr weit verbreitet.
    sourceRefs: [aa-daenemark]
  power:
    voltage: 230
    frequencyHz: 50
    plugTypes: [C, E, F, K]
    adapterHint:
      de: Eurostecker funktionieren in der Regel; bei Schutzkontaktsteckern kann je nach Steckdose ein Adapter sinnvoll sein.
    sourceRefs: [power-daenemark]
  emergency:
    numbers:
      - service:
          de: Einheitlicher Notruf
        number: "112"
    note:
      de: Die 112 ist für Polizei, Feuerwehr und Rettungsdienst erreichbar.
    sourceRefs: [aa-daenemark]
  pets:
    scope:
      de: Private Reise mit Hund, Katze oder Frettchen aus Deutschland.
    requirements:
      - de: Gültiger EU-Heimtierausweis
      - de: Kennzeichnung durch Mikrochip oder zulässige ältere Tätowierung
      - de: Gültige Tollwutimpfung
    youngAnimals:
      de: Für junge Tiere gelten besondere Voraussetzungen; aktuelle EU- und dänische Vorgaben vor der Reise prüfen.
    sourceRefs: [eu-pets]
  phrases:
    - category: greeting
      de: Guten Tag
      local: Goddag
    - category: hotel
      de: Ich habe eine Reservierung.
      local: Jeg har en reservation.
    - category: restaurant
      de: Die Rechnung, bitte.
      local: Regningen, tak.
    - category: shopping
      de: Kann ich mit Karte bezahlen?
      local: Kan jeg betale med kort?
    - category: doctor
      de: Ich brauche einen Arzt.
      local: Jeg har brug for en læge.
    - category: emergency
      de: Bitte rufen Sie den Notruf.
      local: Ring venligst 112.
