content:
  locale: de-DE
  audience:
    residenceCountry: DE
    nationality: DE
  summary:
    de: Reisebasiswissen für deutsche Staatsangehörige mit Schwerpunkt Straßenreise im französischen Mutterland.
  entry:
    documents:
      de: Für deutsche Staatsangehörige ist die Einreise mit Reisepass oder Personalausweis möglich. Auch Kinder benötigen ein eigenes Reisedokument.
      sourceRefs: [aa-frankreich]
    carryDocument:
      de: Ein gültiges Reisedokument sollte während der Reise mitgeführt werden, da Grenz- und Personenkontrollen möglich sind.
      sourceRefs: [aa-frankreich]
  road:
    drivingLicence:
      de: Der deutsche Führerschein wird anerkannt.
      sourceRefs: [aa-frankreich]
    toll:
      de: Viele französische Autobahnen und einzelne Bauwerke sind mautpflichtig. Je nach Betreiber und Strecke erfolgt die Abrechnung an Mautstationen oder über elektronische Mautsysteme.
      paymentMethods:
        de: Je nach Netz stehen unter anderem Kreditkarten, Telemaut-Badges und weitere Zahlungsmittel zur Verfügung. Die Beschilderung der jeweiligen Fahrspur beachten.
      sourceRefs: [asfa-toll]
    restrictedTrafficZones:
      de: In zahlreichen französischen Umweltzonen gelten Zufahrtsbeschränkungen. Für die Einfahrt in ZFE-Zonen ist die Crit'Air-Plakette maßgeblich; Regeln und zugelassene Fahrzeugklassen unterscheiden sich je nach Gebiet.
      sourceRefs: [fr-zfe, fr-critair]
    alcohol:
      de: Allgemeine Alkoholgrenze 0,5 Promille; für Fahranfänger gilt eine niedrigere Grenze von 0,2 Promille.
      sourceRefs: [eu-road-rules-france]
    equipmentAndLights:
      de: Warnweste und Warndreieck gehören zur vorgeschriebenen Fahrzeugausrüstung. Die Warnweste sollte griffbereit im Fahrzeug liegen.
      sourceRefs: [service-public-equipment, eu-road-rules-france]
    winter:
      de: In ausgewiesenen Bergregionen können zwischen 1. November und 31. März Winterreifen oder das Mitführen von Schneeketten vorgeschrieben sein. Beschilderung und regionale Regeln beachten.
      sourceRefs: [eu-road-rules-france]
  money:
    currencyCode: EUR
    currencyName:
      de: Euro
    note:
      de: Frankreich gehört zum Euroraum; ein Währungsumtausch aus Euro ist nicht erforderlich.
    sourceRefs: [ecb-euro]
  power:
    voltage: 230
    frequencyHz: 50
    plugTypes: [C, E]
    adapterHint:
      de: Übliche deutsche Eurostecker passen. Moderne deutsche Schutzkontaktstecker mit kombinierter E/F-Kompatibilität passen in der Regel ebenfalls in französische Typ-E-Steckdosen; für ältere Sonderstecker kann ein Adapter erforderlich sein.
    sourceRefs: [iec-60038, worldstandards-power-france]
  emergency:
    numbers:
      - service:
          de: Einheitlicher Notruf
        number: "112"
    note:
      de: Die 112 ist in der gesamten EU kostenlos erreichbar und verbindet mit den zuständigen Notfalldiensten.
    sourceRefs: [eu-emergency]
  pets:
    scope:
      de: Private Reise mit Hund, Katze oder Frettchen aus Deutschland.
    requirements:
      - de: Gültiger EU-Heimtierausweis
      - de: Kennzeichnung durch Mikrochip oder zulässige ältere Tätowierung
      - de: Gültige Tollwutimpfung
    youngAnimals:
      de: Für junge, noch nicht wirksam gegen Tollwut geimpfte Tiere gelten besondere Regeln; vor der Reise die aktuellen französischen und EU-Vorgaben prüfen.
    sourceRefs: [eu-pets]
  phrases:
    - category: greeting
      de: Guten Tag
      local: Bonjour
    - category: hotel
      de: Ich habe eine Reservierung.
      local: J'ai une réservation.
    - category: restaurant
      de: Die Rechnung, bitte.
      local: L'addition, s'il vous plaît.
    - category: shopping
      de: Kann ich mit Karte bezahlen?
      local: Est-ce que je peux payer par carte ?
    - category: transport
      de: Wo ist die nächste Tankstelle?
      local: Où est la station-service la plus proche ?
    - category: doctor
      de: Ich brauche einen Arzt.
      local: J'ai besoin d'un médecin.
    - category: pharmacy
      de: Wo ist eine Apotheke?
      local: Où est une pharmacie ?
    - category: emergency
      de: Bitte rufen Sie den Notruf.
      local: Appelez les secours, s'il vous plaît.
