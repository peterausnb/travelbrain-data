  entry:
    documents:
      de: Deutsche Staatsangehörige können grundsätzlich mit Reisepass oder Personalausweis einreisen; ein gültiges Reisedokument sollte während der Reise mitgeführt werden.
      sourceRefs: [aa-norwegen]
  road:
    drivingLicence: {de: Der deutsche Führerschein wird anerkannt., sourceRefs: [aa-norwegen]}
    toll:
      de: Viele Straßen, Tunnel, Brücken und Stadtbereiche sind mautpflichtig. Die Erfassung erfolgt überwiegend automatisch über Kennzeichen beziehungsweise elektronische Mautsysteme.
      sourceRefs: [aa-norwegen]
    equipmentAndLights:
      de: Geschwindigkeits-, Alkohol- und Wintervorschriften werden streng kontrolliert; vor Fahrten in Gebirgsregionen aktuelle Straßen- und Wetterlage prüfen.
      sourceRefs: [aa-norwegen]
  money:
    currencyCode: NOK
    currencyName: {de: Norwegische Krone}
