schemaVersion: 1
country:
  iso2: IT
  iso3: ITA
  name:
    de: Italien
  euMember: true
  schengenMember: true
  coverage: complete
content:
  locale: de-DE
  audience:
    residenceCountry: DE
    nationality: DE
  summary:
    de: Reisebasiswissen für deutsche Staatsangehörige mit Schwerpunkt Straßenreise.
  entry:
    documents:
      de: Einreise mit gültigem Reisepass oder Personalausweis; auch Kinder benötigen ein eigenes gültiges Reisedokument.
      sourceRefs: [aa-italien]
    carryDocument:
      de: Ein Reisedokument sollte während der Reise mitgeführt werden, da Kontrollen möglich sind.
      sourceRefs: [aa-italien]
  road:
    drivingLicence:
      de: Der deutsche Führerschein wird anerkannt.
      sourceRefs: [aa-italien]
    toll:
      de: Die meisten Autobahnen und viele Tunnel sind mautpflichtig. Je nach Strecke wird an Mautstellen oder elektronisch abgerechnet.
      paymentMethods:
        de: Auf dem Netz von Autostrade per l'Italia sind unter anderem Bargeld und gekennzeichnete Kartenfahrspuren verfügbar. Die Fahrspur passend zur Zahlungsart wählen.
      sourceRefs: [aa-italien, autostrade-toll, autostrade-cards]
    restrictedTrafficZones:
      de: Viele Städte haben überwachte Zufahrtsbeschränkungen, sogenannte ZTL. Beschilderung beachten und vor Einfahrt prüfen, ob eine Berechtigung erforderlich ist.
      sourceRefs: [aa-italien]
    alcohol:
      de: Allgemeine Alkoholgrenze 0,5 Promille; für Personen unter 21 Jahren oder mit weniger als drei Jahren Fahrpraxis gilt 0,0 Promille.
      sourceRefs: [aa-italien, eu-road-rules-italy]
    equipmentAndLights:
      de: Außerhalb geschlossener Ortschaften ist tagsüber Abblend- oder Tagfahrlicht vorgeschrieben. Eine Warnweste muss mitgeführt werden.
      sourceRefs: [aa-italien, eu-road-rules-italy]
    winter:
      de: Winterausrüstung ist regional und streckenabhängig geregelt. Beschilderung und aktuelle Vorgaben der befahrenen Strecke prüfen.
      sourceRefs: [aa-italien]
  money:
    currencyCode: EUR
    currencyName:
      de: Euro
    note:
      de: Italien gehört zum Euroraum; ein Währungsumtausch aus Euro ist nicht erforderlich.
    sourceRefs: [ecb-euro]
  power:
    voltage: 230
    frequencyHz: 50
    plugTypes: [C, F, L]
    adapterHint:
      de: Deutsche Euro- und Schuko-Stecker passen häufig, aber nicht in jede italienische Typ-L-Steckdose. Bei Schutzkontaktsteckern kann ein Adapter nötig sein.
    sourceRefs: [cei-23-50-v4, iec-60038, worldstandards-power]
  emergency:
    numbers:
      - service:
          de: Einheitlicher Notruf
        number: "112"
    note:
      de: Die 112 ist in der gesamten EU kostenlos erreichbar.
    sourceRefs: [eu-emergency]
  pets:
    scope:
      de: Private Reise mit Hund, Katze oder Frettchen aus Deutschland.
    requirements:
      - de: Gültiger EU-Heimtierausweis
      - de: Kennzeichnung durch Mikrochip oder zulässige ältere Tätowierung
      - de: Gültige Tollwutimpfung; bei Erstimpfung gilt grundsätzlich eine Wartezeit von mindestens 21 Tagen
    youngAnimals:
      de: Italien lässt junge Tiere ohne wirksamen Tollwutschutz nicht einreisen.
    sourceRefs: [eu-pets]
  phrases:
    - category: greeting
      de: Guten Tag
      local: Buongiorno
    - category: hotel
      de: Ich habe eine Reservierung.
      local: Ho una prenotazione.
    - category: restaurant
      de: Die Rechnung, bitte.
      local: Il conto, per favore.
    - category: shopping
      de: Kann ich mit Karte bezahlen?
      local: Posso pagare con la carta?
    - category: transport
      de: Wo ist die nächste Tankstelle?
      local: Dov'è il distributore più vicino?
    - category: doctor
      de: Ich brauche einen Arzt.
      local: Ho bisogno di un medico.
    - category: pharmacy
      de: Wo ist eine Apotheke?
      local: Dov'è una farmacia?
    - category: emergency
      de: Bitte rufen Sie den Notruf.
      local: Chiami il numero di emergenza, per favore.
