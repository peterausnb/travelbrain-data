content:
  locale: de-DE
  audience:
    residenceCountry: DE
    nationality: DE
  summary:
    de: Transitwissen für Fahrten aus Deutschland nach Italien über den Gotthard.
  entry:
    documents:
      de: Einreise mit gültigem Reisepass oder Personalausweis; auch Kinder benötigen ein eigenes gültiges Reisedokument.
      sourceRefs: [aa-schweiz]
    borderNote:
      de: Vorübergehende Kontrollen und Wartezeiten an der deutsch-schweizerischen Grenze sind möglich.
      sourceRefs: [aa-schweiz]
  road:
    toll:
      de: Für Autos, Motorräder, Anhänger, Wohnwagen und Camper bis 3,5 Tonnen ist auf Autobahnen und Autostrassen eine Jahresvignette erforderlich. Sie ist als Klebe- oder E-Vignette erhältlich; Kurzzeitvignetten gibt es nicht.
      sourceRefs: [ch-vignette]
    vignettePrice:
      amount: 40
      currencyCode: CHF
      note:
        de: Preis der Vignette 2026; vor der Reise erneut prüfen.
      sourceRefs: [ch-vignette]
    drivingRules:
      de: Ganzjährig mit Tagfahr- oder Abblendlicht fahren. Die allgemeine Alkoholgrenze beträgt 0,5 Promille, für Fahranfänger in den ersten drei Jahren 0,1 Promille.
      sourceRefs: [aa-schweiz]
    corridorAdvisory:
      de: Sperrungen und starke Wartezeiten am Gotthard sind möglich. Vor Abfahrt die aktuelle Verkehrslage prüfen; TravelBrain ersetzt keine Navigation oder Live-Verkehrsauskunft.
      sourceRefs: [aa-schweiz]
  money:
    currencyCode: CHF
    currencyName:
      de: Schweizer Franken
    note:
      de: Euro werden mancherorts akzeptiert, sind aber nicht die Landeswährung.
    sourceRefs: [aa-schweiz, snb-cash]
  emergency:
    numbers:
      - service:
          de: Einheitlicher Notruf
        number: "112"
