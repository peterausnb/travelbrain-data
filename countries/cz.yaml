content:
  locale: de-DE
  audience:
    residenceCountry: DE
    nationality: DE
  summary:
    de: Reisebasiswissen für deutsche Staatsangehörige mit Schwerpunkt Straßenreise nach Tschechien.
  entry:
    documents:
      de: Deutsche Staatsangehörige können mit Reisepass oder Personalausweis einreisen. Auch Kinder benötigen ein eigenes gültiges Reisedokument.
      sourceRefs: [aa-tschechien]
    carryDocument:
      de: Ein gültiges Reisedokument sollte während der Reise mitgeführt werden, da Kontrollen möglich sind.
      sourceRefs: [aa-tschechien]
  road:
    drivingLicence:
      de: Der deutsche Führerschein wird anerkannt.
      sourceRefs: [aa-tschechien]
    toll:
      de: Pkw bis 3,5 t benötigen für Autobahnen und bestimmte Schnellstraßen eine elektronische Vignette. Kaufen Sie diese nur über offizielle Verkaufswege.
      sourceRefs: [aa-tschechien]
    equipmentAndLights:
      de: Vor Fahrtantritt die aktuellen tschechischen Ausrüstungs-, Winter- und Lichtvorschriften prüfen; bei Kontrollen können hohe Sicherheitsleistungen verlangt werden.
      sourceRefs: [aa-tschechien]
  money:
    currencyCode: CZK
    currencyName:
      de: Tschechische Krone
    note:
      de: Tschechien gehört nicht zum Euroraum. Kartenzahlung ist weit verbreitet, eine kleine Bargeldreserve kann dennoch sinnvoll sein.
    sourceRefs: [aa-tschechien]
  power:
    voltage: 230
    frequencyHz: 50
    plugTypes: [C, E]
    adapterHint:
      de: Eurostecker passen. Moderne kombinierte E/F-Schutzkontaktstecker funktionieren in der Regel ebenfalls.
    sourceRefs: [power-tschechien]
  emergency:
    numbers:
      - service:
          de: Einheitlicher Notruf
        number: "112"
    note:
      de: Die 112 ist kostenlos erreichbar.
    sourceRefs: [aa-tschechien]
  pets:
    scope:
      de: Private Reise mit Hund, Katze oder Frettchen aus Deutschland.
    requirements:
      - de: Gültiger EU-Heimtierausweis
      - de: Kennzeichnung durch Mikrochip oder zulässige ältere Tätowierung
      - de: Gültige Tollwutimpfung
    youngAnimals:
      de: Für junge Tiere gelten besondere Voraussetzungen; aktuelle EU- und tschechische Vorgaben vor der Reise prüfen.
    sourceRefs: [eu-pets]
  phrases:
    - category: greeting
      de: Guten Tag
      local: Dobrý den
    - category: hotel
      de: Ich habe eine Reservierung.
      local: Mám rezervaci.
    - category: restaurant
      de: Die Rechnung, bitte.
      local: Účet, prosím.
    - category: shopping
      de: Kann ich mit Karte bezahlen?
      local: Mohu platit kartou?
    - category: doctor
      de: Ich brauche einen Arzt.
      local: Potřebuji lékaře.
    - category: emergency
      de: Bitte rufen Sie den Notruf.
      local: Prosím, zavolejte 112.
