  summary:
    de: Transitwissen für Fahrten aus Deutschland nach Italien über den Brenner.
  entry:
    documents:
      de: Einreise mit Reisepass oder Personalausweis möglich; ein gültiges Reisedokument sollte auch für Kinder mitgeführt werden.
      sourceRefs: [aa-oesterreich]
  road:
    toll:
      de: Für Fahrzeuge bis einschließlich 3,5 Tonnen gilt auf fast allen Autobahnen und Schnellstraßen die Vignettenpflicht. Auf der A 13 Brenner wird zusätzlich beziehungsweise abschnittsbezogen eine Streckenmaut erhoben.
      sourceRefs: [asfinag-toll-system, asfinag-brenner]
    digitalPurchase:
      de: Die digitale 1-Tages- und 10-Tages-Vignette kann sofort gültig sein. Beim Onlinekauf als Privatperson gelten 2-Monats- und Jahresvignetten grundsätzlich erst ab dem 18. Tag.
      sourceRefs: [asfinag-toll-system]
    corridorAdvisory:
      de: Wegen des Neubaus der Luegbrücke gilt auf der A 13 grundsätzlich eine einspurige Verkehrsführung je Richtung; an ausgewählten Tagen wird temporär zweispurig geführt. Vor Abfahrt Fahrkalender und Verkehrslage prüfen.
      sourceRefs: [asfinag-lueg]
  money:
    currencyCode: EUR
    currencyName:
