      de: Auf Autobahnen und bestimmten Fernstraßen gilt für Pkw eine elektronische Vignettenpflicht. Offizielle Informationen und Verkauf bietet DARS.
      sourceRefs: [aa-slowenien]
    equipmentAndLights:
      de: Ganztägig muss mit Abblendlicht gefahren werden. Vom 15. November bis 15. März gelten Winterausrüstungsvorgaben.
      sourceRefs: [aa-slowenien]
